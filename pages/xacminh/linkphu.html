<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeltaVN HuyMythic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://pl28686410.effectivecpmnetwork.com/aa/e7/fc/aae7fc3e0643c4018ec9dc41f751d83f.js"></script>
    <script src="https://pl28440493.effectivecpmnetwork.com/9a/0d/a5/9a0da502d2d4902c316c37b32232af77.js"></script>

    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            background-color: #03001e;
        }

        @keyframes nebula-flow {
            0%, 100% {
                transform: translate3d(0, 0, 0) scale(1);
            }
            50% {
                transform: translate3d(5%, 3%, 0) scale(1.08);
            }
        }

        @keyframes nebula-flow-reverse {
            0%, 100% {
                transform: translate3d(0, 0, 0) scale(1.05);
            }
            50% {
                transform: translate3d(-4%, -5%, 0) scale(0.95);
            }
        }

        .nebula-1 {
            animation: nebula-flow 18s ease-in-out infinite alternate;
            will-change: transform;
        }

        .nebula-2 {
            animation: nebula-flow-reverse 22s ease-in-out infinite alternate;
            will-change: transform;
        }

        .galaxy-card {
            background: rgba(10, 10, 25, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(139, 92, 246, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), 
                        inset 0 0 15px rgba(139, 92, 246, 0.15);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between font-sans overflow-x-hidden relative">

    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="nebula-1 absolute -top-40 -left-40 w-[110vw] h-[110vw] max-w-[500px] max-h-[500px] rounded-full bg-gradient-to-br from-purple-800/25 via-pink-600/10 to-transparent blur-[80px]"></div>
        <div class="nebula-2 absolute -bottom-40 -right-40 w-[110vw] h-[110vw] max-w-[500px] max-h-[500px] rounded-full bg-gradient-to-tl from-cyan-800/20 via-indigo-900/15 to-transparent blur-[90px]"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vw] h-[90vw] max-w-[400px] max-h-[400px] rounded-full bg-indigo-500/5 blur-[100px]"></div>
    </div>

    <header class="border-b border-purple-900/20 bg-slate-950/40 backdrop-blur-md sticky top-0 z-50 py-3.5 px-4 md:px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8.5 h-8.5 bg-gradient-to-br from-indigo-500 via-purple-600 to-pink-500 rounded-lg flex items-center justify-center shadow-lg shadow-purple-500/25">
                    <i class="fa-solid fa-compass-drafting text-white text-sm"></i>
                </div>
                <span class="font-extrabold text-base tracking-widest bg-gradient-to-r from-blue-300 via-purple-400 to-pink-400 bg-clip-text text-transparent">HuyMythicIOS</span>
            </div>
            <div class="text-[11px] bg-purple-950/50 text-purple-300 px-3 py-1 rounded-full border border-purple-500/30 flex items-center gap-1.5 backdrop-blur-sm">
                <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                HuyMythicIOS
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 z-10">
        <div class="w-full max-w-[365px] sm:max-w-md galaxy-card rounded-2xl p-5 sm:p-7 relative overflow-hidden transition-all duration-300">
            
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2.5">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Xác Minh</span>
                    <span class="text-[11px] font-bold text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.3)]" id="step-text">Bước 1/5</span>
                </div>
                <div class="flex gap-1.5" id="steps-container"></div>
            </div>

            <div class="text-center mb-6">
                <div class="inline-flex p-3 bg-purple-500/10 rounded-full text-purple-300 mb-3 border border-purple-500/25 relative" id="icon-container">
                    <div class="absolute inset-0 bg-purple-500/20 rounded-full blur-md animate-pulse"></div>
                    <i class="fa-solid fa-fingerprint text-2xl relative z-10 animate-pulse"></i>
                </div>
                <h1 class="text-lg font-extrabold mb-1.5 tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-300 bg-clip-text text-transparent" id="status-title">DeltaVN HuyMythic - Bước 1</h1>
                <p class="text-xs text-slate-400 leading-relaxed max-w-[280px] mx-auto" id="status-desc">
                    Vui lòng xác minh 5 bước để đến trang đích!.
                </p>
            </div>

            <div class="mb-6 bg-slate-950/70 p-4 rounded-xl border border-purple-500/20 text-center relative overflow-hidden">
                <div id="progress-bar-bg" class="absolute bottom-0 left-0 h-[3px] bg-gradient-to-r from-cyan-400 via-indigo-500 to-purple-500 w-full transition-all duration-300 shadow-[0_0_8px_rgba(6,182,212,0.5)]"></div>
                <div class="text-[10px] text-slate-400 mb-0.5 font-bold tracking-widest uppercase">Thời Gian Hiệu Chuẩn</div>
                <div class="text-2xl font-black text-white tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.4)]" id="countdown-timer">10s</div>
            </div>

            <button id="verify-btn" class="w-full py-3.5 px-5 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 text-white hover:shadow-indigo-500/30 active:scale-[0.98] border border-indigo-400/30 cursor-pointer">
                <i class="fa-solid fa-lock-open mr-1 text-[11px]" id="btn-spinner"></i>
                <span id="btn-text">BẮT ĐẦU XÁC MINH CỔNG TRUYỀN</span>
            </button>
            
        </div>
    </main>

    <footer class="py-4 text-center text-[10px] text-slate-500 border-t border-purple-900/10 bg-slate-950/60 backdrop-blur-md z-10">
        <div class="max-w-4xl mx-auto px-4">
            <p class="mb-1">HuyMythicIOS</p>
            <p>&copy; 2026 HuyMythicIOS</p>
        </div>
    </footer>

    <script>
        const SMART_LINK_URL = "https://www.effectivecpmnetwork.com/ii6rhu2eay?key=4281f1fabd88d9cd20a896869f40503b";
        const link_goc = "https://www.mediafire.com/file/0ea4gz0yrzhb77x/DeltaVN+V64-02+HuyMythic+Update.ipa/file"
        let currentStep = 1;
        const totalSteps = 5;
        const waitingSeconds = 10;
        
        let timeLeft = waitingSeconds;
        let countdownInterval = null;
        let screenClicks = 0;
        const requiredClicks = 3;
        let postClicks = 0;
        const requiredPostClicks = 2;
        let currentState = 'CLICKING'; 

        const stepText = document.getElementById('step-text');
        const stepsContainer = document.getElementById('steps-container');
        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');
        const countdownTimer = document.getElementById('countdown-timer');
        const verifyBtn = document.getElementById('verify-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const progressBarBg = document.getElementById('progress-bar-bg');
        const iconContainer = document.getElementById('icon-container');

        function renderStepBars() {
            stepsContainer.innerHTML = '';
            for (let i = 1; i <= totalSteps; i++) {
                const bar = document.createElement('div');
                bar.className = `h-1.5 flex-1 rounded-full transition-all duration-500 ${
                    i < currentStep 
                    ? 'bg-gradient-to-r from-emerald-500 to-cyan-400' 
                    : (i === currentStep ? 'bg-gradient-to-r from-purple-500 to-pink-500 shadow-[0_0_8px_rgba(139,92,246,0.6)]' : 'bg-slate-800')
                }`;
                stepsContainer.appendChild(bar);
            }
        }

        function startStepTimer() {
            timeLeft = waitingSeconds;
            updateUI();
            
            progressBarBg.style.transition = 'none';
            progressBarBg.style.width = '100%';
            setTimeout(() => {
                progressBarBg.style.transition = `width ${waitingSeconds}s linear`;
                progressBarBg.style.width = '0%';
            }, 50);

            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) {
                    countdownTimer.innerText = `${timeLeft}s`;
                }
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    currentState = 'AFTER_CLICKS';
                    updateUI();
                }
            }, 1000);
        }

        function updateUI() {
            stepText.innerText = `Bước ${currentStep}/${totalSteps}`;
            renderStepBars();

            if (currentState === 'CLICKING') {
                statusTitle.innerText = `DeltaVN HuyMythic - Bước ${currentStep}`;
                statusDesc.innerText = `Vui lòng xác minh 5 bước để đến trang đích!.`;
                iconContainer.innerHTML = `
                    <div class="absolute inset-0 bg-indigo-500/10 rounded-full blur-md animate-pulse"></div>
                    <i class="fa-solid fa-fingerprint text-2xl relative z-10 text-indigo-400 animate-pulse"></i>
                `;
                
                countdownTimer.innerText = `10s`;
                progressBarBg.style.transition = 'none';
                progressBarBg.style.width = '100%';

                verifyBtn.disabled = false;
                verifyBtn.className = "w-full py-3.5 px-5 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 text-white hover:shadow-indigo-500/30 active:scale-[0.98] border border-indigo-400/30 cursor-pointer";
                btnText.innerText = "KÍCH HOẠT HỆ THỐNG XÁC MINH";
                btnSpinner.className = "fa-solid fa-lock-open mr-1 text-[11px]";
            } 
            else if (currentState === 'READY_TO_START') {
                statusTitle.innerText = `Xác minh thành công!`;
                statusDesc.innerText = `Vui lòng bấm nút bên dưới để khởi động bộ đếm 10s.`;
                iconContainer.innerHTML = `
                    <div class="absolute inset-0 bg-green-500/20 rounded-full blur-md animate-pulse"></div>
                    <i class="fa-solid fa-unlock-keyhole text-2xl relative z-10 text-emerald-400 animate-bounce"></i>
                `;

                verifyBtn.disabled = false;
                verifyBtn.className = "w-full py-3.5 px-5 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-blue-500 via-indigo-600 to-purple-600 text-white hover:shadow-indigo-500/20 active:scale-[0.98] border border-indigo-400/30 cursor-pointer";
                btnText.innerText = "BẮT ĐẦU ĐẾM NGƯỢC XÁC MINH (10S)";
                btnSpinner.className = "fa-solid fa-play mr-1 text-[11px] text-cyan-300";
            }
            else if (currentState === 'COUNTING') {
                statusTitle.innerText = `Đang đồng bộ hóa dữ liệu...`;
                statusDesc.innerText = `Vui lòng đợi mạng lưới vũ trụ hoàn tất quá trình thiết lập bảo vệ thiết bị.`;
                iconContainer.innerHTML = `
                    <div class="absolute inset-0 bg-cyan-500/10 rounded-full blur-md animate-pulse"></div>
                    <i class="fa-solid fa-satellite-dish text-2xl relative z-10 text-cyan-400 animate-spin" style="animation-duration: 3s"></i>
                `;
                countdownTimer.innerText = `${timeLeft}s`;

                verifyBtn.disabled = true;
                verifyBtn.className = "w-full py-3.5 px-5 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed bg-slate-800/40 text-slate-500 border border-slate-700/50 active:scale-[0.98]";
                btnText.innerText = `ĐANG HIỆU CHUẨN... ${timeLeft}S`;
                btnSpinner.className = "fa-solid fa-hourglass-half animate-spin mr-1 text-[11px] text-indigo-400";
            }
            else if (currentState === 'AFTER_CLICKS') {
                statusTitle.innerText = `Xử lý bước cuối - Bước ${currentStep}`;
                statusDesc.innerText = `Tiến trình hiệu chuẩn sắp kết thúc. Vui lòng xác thực nốt dải tần còn lại.`;
                iconContainer.innerHTML = `
                    <div class="absolute inset-0 bg-pink-500/10 rounded-full blur-md animate-pulse"></div>
                    <i class="fa-solid fa-shield-halved text-2xl relative z-10 text-pink-400 animate-pulse"></i>
                `;
                
                countdownTimer.innerText = `0s`;
                progressBarBg.style.transition = 'none';
                progressBarBg.style.width = '0%';

                verifyBtn.disabled = false;
                verifyBtn.className = "w-full py-3.5 px-5 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 text-white hover:shadow-indigo-500/30 active:scale-[0.98] border border-indigo-400/30 cursor-pointer";
                btnText.innerText = "XÁC NHẬN LIÊN KẾT AN TOÀN";
                btnSpinner.className = "fa-solid fa-shield mr-1 text-[11px]";
            }
            else if (currentState === 'READY_TO_PROCEED') {
                statusTitle.innerText = `Hoàn tất Bước ${currentStep}!`;
                statusDesc.innerText = `Xác thực thành công. Nhấp nút bên dưới để tiến hành truyền tải liên kết tiếp theo.`;
                iconContainer.innerHTML = `
                    <div class="absolute inset-0 bg-emerald-500/20 rounded-full blur-md animate-pulse"></div>
                    <i class="fa-solid fa-circle-check text-2xl relative z-10 text-emerald-400 animate-bounce"></i>
                `;
                countdownTimer.innerText = `0s`;

                verifyBtn.disabled = false;
                verifyBtn.className = "w-full py-3.5 px-5 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:shadow-emerald-500/25 active:scale-[0.98] border border-emerald-400/30 cursor-pointer";
                
                if (currentStep < totalSteps) {
                    btnText.innerText = "CHUYỂN SANG BƯỚC KẾ TIẾP";
                    btnSpinner.className = "fa-solid fa-circle-arrow-right mr-1 text-[11px] text-emerald-200";
                } else {
                    btnText.innerText = "HOÀN TẤT & TẢI TRANG ĐÍCH";
                    btnSpinner.className = "fa-solid fa-rocket mr-1 text-[11px] text-yellow-300 animate-bounce";
                }
            }
        }

        document.addEventListener('click', () => {
            if (currentState === 'CLICKING') {
                screenClicks++;
                window.open(SMART_LINK_URL, '_blank');
                if (screenClicks >= requiredClicks) {
                    currentState = 'READY_TO_START';
                }
                updateUI();
            }
            else if (currentState === 'AFTER_CLICKS') {
                postClicks++;
                window.open(SMART_LINK_URL, '_blank');
                if (postClicks >= requiredPostClicks) {
                    currentState = 'READY_TO_PROCEED';
                }
                updateUI();
            }
        });

        verifyBtn.addEventListener('click', (e) => {
            e.stopPropagation();

            if (verifyBtn.disabled) return;

            if (currentState === 'CLICKING') {
                screenClicks++;
                window.open(SMART_LINK_URL, '_blank');
                if (screenClicks >= requiredClicks) {
                    currentState = 'READY_TO_START';
                }
                updateUI();
            }
            else if (currentState === 'READY_TO_START') {
                currentState = 'COUNTING';
                startStepTimer();
            } 
            else if (currentState === 'AFTER_CLICKS') {
                postClicks++;
                window.open(SMART_LINK_URL, '_blank');
                if (postClicks >= requiredPostClicks) {
                    currentState = 'READY_TO_PROCEED';
                }
                updateUI();
            }
            else if (currentState === 'READY_TO_PROCEED') {
                if (currentStep < totalSteps) {
                    currentStep++;
                    currentState = 'CLICKING';
                    screenClicks = 0;
                    postClicks = 0;
                    timeLeft = waitingSeconds;
                    updateUI();
                } else {
                    handleAllStepsCompleted();
                }
            }
        });

        function handleAllStepsCompleted() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            statusTitle.innerText = "Xác Minh Hoàn Tất!";
            statusDesc.innerText = "Xác minh thành công!. Đang tải đến trang đích...";
            iconContainer.className = "inline-flex p-3 bg-emerald-500/20 rounded-full text-emerald-400 mb-4 border border-emerald-500/30 relative";
            iconContainer.innerHTML = `
                <div class="absolute inset-0 bg-emerald-400/30 rounded-full blur-md animate-ping"></div>
                <i class="fa-solid fa-space-shuttle text-2xl relative z-10 text-emerald-300 transform -rotate-45"></i>
            `;
            
            verifyBtn.className = "w-full py-4 px-6 rounded-xl font-bold text-xs tracking-widest transition-all duration-300 flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 text-white shadow-emerald-500/30";
            btnText.innerText = "ĐANG TẢI TRANG ĐÍCH...";
            btnSpinner.className = "fa-solid fa-spinner animate-spin mr-1 text-white";
            
            setTimeout(() => {
                window.location.href = link_goc;
            }, 1500);
        }

        window.onload = function() {
            updateUI();
        };
    </script>
</body>
</html>
